version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fraudintel
      POSTGRES_PASSWORD: fraudintel123
      POSTGRES_DB: fraud_intel_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraudintel"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://fraudintel:fraudintel123@db:5432/fraud_intel_db
      JWT_SECRET: change-this-secret-in-production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      NODE_ENV: development
      ALLOWED_ORIGINS: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs

volumes:
  pgdata:
